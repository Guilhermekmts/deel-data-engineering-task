services:
  transactions-db:
    build:
      context: ./docker/postgres-db
    environment:
      - POSTGRES_USER=finance_db_user
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=finance_db
    volumes:
        - pg-data:/var/lib/postgresql/data
        - "${PWD}/db-scripts/initialize_db_ddl.sql:/docker-entrypoint-initdb.d/initialize_db_ddl.sql"
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "wal_level=logical", "-c", "hot_standby=on"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  kafka-connect:
    image: debezium/connect:2.4
    depends_on:
      - kafka
      - transactions-db
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    ports:
      - "8083:8083"

  analytics-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=analytics_user
      - POSTGRES_PASSWORD=analytics_1234
      - POSTGRES_DB=analytics_db
    volumes:
      - analytics-pg-data:/var/lib/postgresql/data
      - "${PWD}/db-scripts/initialize_analytics_ddl.sql:/docker-entrypoint-initdb.d/initialize_analytics_ddl.sql"
    ports:
      - "5433:5432"

  debezium-init:
    image: curlimages/curl:latest
    depends_on:
      - kafka-connect
    volumes:
      - "${PWD}/debezium/init-connectors.sh:/init-connectors.sh"
      - "${PWD}/debezium/connectors:/connectors"
    entrypoint: ["/bin/sh", "/init-connectors.sh"]
    restart: "no"

  spark:
    build:
      context: .
      dockerfile: ./docker/spark/Dockerfile
    depends_on:
      - kafka
      - transactions-db
      - analytics-db
    working_dir: /workspace
    volumes:
      - "${PWD}:/workspace"
      - "${PWD}/.spark-checkpoints:/workspace/.spark-checkpoints"
    environment:
      - SPARK_MODE=client
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SOURCE_DB_HOST=transactions-db
      - SOURCE_DB_PORT=5432
      - SOURCE_DB_NAME=finance_db
      - SOURCE_DB_USER=finance_db_user
      - SOURCE_DB_PASSWORD=1234
      - TARGET_DB_HOST=analytics-db
      - TARGET_DB_PORT=5432
      - TARGET_DB_NAME=analytics_db
      - TARGET_DB_USER=analytics_user
      - TARGET_DB_PASSWORD=analytics_1234
      - CHECKPOINT_ROOT=/workspace/.spark-checkpoints
    command: ["sleep", "infinity"]

  health-watcher:
    build:
      context: .
      dockerfile: ./docker/spark/Dockerfile
    depends_on:
      - kafka
      - spark
      - transactions-db
      - analytics-db
    working_dir: /workspace
    volumes:
      - "${PWD}:/workspace"
      - "${PWD}/.spark-checkpoints:/workspace/.spark-checkpoints"
      - "${PWD}/data/delta:/workspace/data/delta"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SOURCE_DB_HOST=transactions-db
      - SOURCE_DB_PORT=5432
      - SOURCE_DB_NAME=finance_db
      - SOURCE_DB_USER=finance_db_user
      - SOURCE_DB_PASSWORD=1234
      - TARGET_DB_HOST=analytics-db
      - TARGET_DB_PORT=5432
      - TARGET_DB_NAME=analytics_db
      - TARGET_DB_USER=analytics_user
      - TARGET_DB_PASSWORD=analytics_1234
      - CHECKPOINT_ROOT=/workspace/.spark-checkpoints
      - DELTA_ROOT=/workspace/data/delta
    command: >
      sh -c "
        while true; do
          echo 'Running health checks...'
          /workspace/scripts/run_health.sh;
          echo 'Sleeping 60 seconds...';
          sleep 60;
        done
      "

  snapshot-runner:
    build:
      context: .
      dockerfile: ./docker/spark/Dockerfile
    depends_on:
      - spark
    working_dir: /workspace
    volumes:
      - "${PWD}:/workspace"
      - "${PWD}/.spark-checkpoints:/workspace/.spark-checkpoints"
      - "${PWD}/data/delta:/workspace/data/delta"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SOURCE_DB_HOST=transactions-db
      - SOURCE_DB_PORT=5432
      - SOURCE_DB_NAME=finance_db
      - SOURCE_DB_USER=finance_db_user
      - SOURCE_DB_PASSWORD=1234
      - TARGET_DB_HOST=analytics-db
      - TARGET_DB_PORT=5432
      - TARGET_DB_NAME=analytics_db
      - TARGET_DB_USER=analytics_user
      - TARGET_DB_PASSWORD=analytics_1234
      - CHECKPOINT_ROOT=/workspace/.spark-checkpoints
      - DELTA_ROOT=/workspace/data/delta
    command: >
      sh -c "
        while true; do
          echo 'Taking hourly snapshots...'
          /workspace/scripts/run_snapshots.sh;
          echo 'Sleeping 3600 seconds...';
          sleep 3600;
        done
      "

volumes:
  pg-data:
  analytics-pg-data:
